version: '3'

vars:
  ZIG: mise x -- zig

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build:
    desc: Build arcana (check compilation)
    cmds:
      - "{{.ZIG}} build"

  test:
    desc: Run unit tests (no network, no API keys needed)
    cmds:
      - "{{.ZIG}} build test --summary all"

  test:live:
    desc: Run live integration tests (needs ANTHROPIC_API_KEY)
    cmds:
      - "{{.ZIG}} build test-live --summary all"

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf .zig-cache zig-out
